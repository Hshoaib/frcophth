const JOURNAL_TAGS=["Day off","Normal","Long day","Nights"];

function jStamp(ms){return new Date(ms).toLocaleString("en-GB",{weekday:"short",day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"});}

async function renderJournal(el){
  const [entries,planItems,days]=await Promise.all([dbAll("journal"),dbAll("plan"),dbAll("days")]);
  const dayMap={}; days.forEach(d=>dayMap[d.date]=d);

  const composer=`
   <div class="shead"><h2>New entry</h2><div class="rule"></div><button class="jr-review" id="jReview">＋ Weekly review</button></div>
   <div class="card jcomposer">
     <div class="energy" id="jEnergy" data-energy="0">
       <span class="elabel">Energy</span>
       ${[1,2,3,4,5].map(n=>`<button class="edot" data-e="${n}" aria-label="Energy ${n}"></button>`).join("")}
     </div>
     <div class="jtags" id="jTags">
       ${JOURNAL_TAGS.map(t=>`<button class="jtag" data-tag="${esc(t)}">${esc(t)}</button>`).join("")}
     </div>
     <textarea id="jText" class="jtext" placeholder="How did today go? What helped, what got in the way?"></textarea>
     <div class="btnrow"><button class="btn" id="jSave">Save entry</button></div>
   </div>`;

  // merge free-form entries + task reflections into one timeline
  const reflections=planItems.filter(i=>i.reflect&&i.reflect.trim()).map(i=>({
    kind:"reflection",
    at:i.completedAt?Date.parse(i.completedAt):Date.parse(i.scheduledDate+"T12:00:00"),
    date:i.completedAt?i.completedAt.slice(0,10):i.scheduledDate,
    item:i
  }));
  const ent=entries.map(e=>({...e,kind:e.kind||"entry"}));
  const timeline=[...ent,...reflections].sort((a,b)=>b.at-a.at);
  const rows=timeline.length
    ? timeline.map(t=>t.kind==="reflection"?reflectionCard(t):journalCard(t,dayMap)).join("")
    : `<div class="empty"><h3>Nothing here yet</h3><p>Write how a day went, or reflect on a task from Today — task reflections show up here automatically.</p></div>`;

  el.innerHTML=composer+`<div class="shead"><h2>Timeline</h2><div class="rule"></div><span class="count">${timeline.length}</span></div>`+rows;

  wireJournalComposer(el);
  el.querySelectorAll("[data-jdel]").forEach(b=>b.onclick=()=>dbDel("journal",b.dataset.jdel).then(()=>renderJournal(el)));
}

function journalCard(e,dayMap){
  const dm=dayMap[e.date];
  const ctx=dm&&(dm.label||dm.loadLevel)?`<span class="j-ctx">${esc(dm.label||dm.loadLevel)}</span>`:"";
  const energy=e.energy?`<span class="j-energy">${[1,2,3,4,5].map(n=>`<span class="edot sm ${n<=e.energy?"on":""}"></span>`).join("")}</span>`:"";
  const tag=e.tag?`<span class="jtag-chip">${esc(e.tag)}</span>`:"";
  const badge=e.kind==="review"?`<span class="j-review-badge">weekly review</span>`:"";
  const meta=(energy||tag)?`<div class="j-meta">${energy}${tag}</div>`:"";
  return `<article class="j-card ${e.kind==="review"?"is-review":""}">
    <div class="j-head"><span class="j-when mono">${esc(jStamp(e.at))}</span>${badge}${ctx}<button class="x" data-jdel="${e.id}" aria-label="Delete">×</button></div>
    ${meta}<div class="j-text">${esc(e.text).replace(/\n/g,"<br>")}</div></article>`;
}

function reflectionCard(t){
  const i=t.item;
  return `<article class="j-card is-reflection">
    <div class="j-head"><span class="j-when mono">${esc(jStamp(t.at))}</span><span class="j-from">from a task</span></div>
    <div class="j-task"><span class="chip ${esc(i.track)}">${esc(i.track)}</span> ${esc(i.title)}</div>
    <div class="j-text">${esc(i.reflect).replace(/\n/g,"<br>")}</div></article>`;
}

function wireJournalComposer(el){
  const wrap=el.querySelector("#jEnergy");
  el.querySelectorAll("#jEnergy .edot").forEach(b=>b.onclick=()=>{
    const n=Number(b.dataset.e), cur=Number(wrap.dataset.energy||0);
    const val=cur===n?n-1:n;           // tap the current top dot to step back down
    wrap.dataset.energy=val;
    el.querySelectorAll("#jEnergy .edot").forEach(d=>d.classList.toggle("on",Number(d.dataset.e)<=val));
  });
  el.querySelectorAll("#jTags .jtag").forEach(b=>b.onclick=()=>{
    const on=b.classList.contains("on");
    el.querySelectorAll("#jTags .jtag").forEach(d=>d.classList.remove("on"));
    if(!on) b.classList.add("on");
  });
  const rev=el.querySelector("#jReview");
  if(rev) rev.onclick=()=>{
    const ta=el.querySelector("#jText");
    ta.value="Weekly review\n\n• What went well:\n• What slipped, and why:\n• When could I actually study (energy / shift pattern):\n• One change for next week:\n";
    ta.dataset.review="1"; ta.focus();
  };
  const save=el.querySelector("#jSave"); if(save) save.onclick=()=>saveJournal(el);
  const ta=el.querySelector("#jText"); if(ta) ta.addEventListener("input",()=>{if(ta.dataset.review==="1"&&!ta.value.startsWith("Weekly review")) ta.dataset.review="";});
}

async function saveJournal(el){
  const ta=el.querySelector("#jText"), text=ta.value.trim();
  if(!text){toast("Write something first");return;}
  const energy=Number(el.querySelector("#jEnergy").dataset.energy||0)||null;
  const tagBtn=el.querySelector("#jTags .jtag.on"), tag=tagBtn?tagBtn.dataset.tag:null;
  const kind=ta.dataset.review==="1"?"review":"entry";
  await dbPut("journal",{id:uid(),at:Date.now(),date:todayISO(),energy,tag,text,kind});
  renderJournal(el); toast("Saved");
}

/* =========================================================================
   SYNC  (slice 5) — Google Drive appData (non-sensitive scope), whole-snapshot
   last-write-wins with a conflict guard. All network code is best-effort and
   wrapped so the app works fully without it.
   ========================================================================= */
const SYNC_FILE="theatre.json";

/* ▼▼▼  PASTE YOUR GOOGLE OAUTH CLIENT ID BETWEEN THE QUOTES TO BAKE IT IN  ▼▼▼
   Leave it as "" to instead type the ID into Settings → Sync on each device. */
const GOOGLE_CLIENT_ID="854503122235-qugp4o26i0sm2krtnj3l6icgnstvso0p.apps.googleusercontent.com";
/* ▲▲▲  ------------------------------------------------------------------  ▲▲▲ */
function clientId(){return GOOGLE_CLIENT_ID||(syncCfg&&syncCfg.clientId)||"";}

const DATA_STORES=Object.keys(STORES).filter(s=>s!=="meta"); // meta holds sync state — never synced
let syncCfg=null, suspendDirty=false, pushTimer=null;
let gToken=null, gTokenExp=0, tokenClient=null, tokenResolve=null, tokenReject=null;

function defaultSyncCfg(){return {clientId:"",connected:false,fileId:null,deviceId:uid(),lastSyncAt:0,dirtySince:0,auto:true};}
async function loadSyncCfg(){const r=await dbGet("meta","sync");syncCfg=r&&r.value?r.value:defaultSyncCfg();return syncCfg;}
async function saveSyncCfg(){await dbPut("meta",{key:"sync",value:syncCfg});}

function markDirty(store){
  if(store==="meta"||suspendDirty||!syncCfg) return;
  syncCfg.dirtySince=Date.now();
  dbPut("meta",{key:"sync",value:syncCfg});           // persist (excluded from dirtying)
  if(syncCfg.connected&&syncCfg.auto) scheduleAutoPush();
  updateSyncBadge();
}
function scheduleAutoPush(){clearTimeout(pushTimer);pushTimer=setTimeout(()=>{pushSync().then(updateSyncBadge).catch(e=>console.warn("auto-push",e));},4000);}

/* ---- Google token ---- */
function gisReady(){return typeof google!=="undefined"&&google.accounts&&google.accounts.oauth2;}
function initTokenClient(){
  tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:clientId(),
    scope:"https://www.googleapis.com/auth/drive.appdata",
    callback:resp=>{
      if(resp&&resp.access_token){gToken=resp.access_token;gTokenExp=Date.now()+((resp.expires_in||3600)*1000);if(tokenResolve)tokenResolve(gToken);}
      else if(tokenReject) tokenReject(new Error(resp&&resp.error||"token error"));
      tokenResolve=tokenReject=null;
    },
    error_callback:err=>{if(tokenReject)tokenReject(new Error(err&&err.type||"sign-in cancelled"));tokenResolve=tokenReject=null;}
  });
}
function getToken(interactive){
  return new Promise((res,rej)=>{
    if(!gisReady()) return rej(new Error("Google library not loaded — need to be online."));
    if(!clientId()) return rej(new Error("No Google client ID set."));
    if(gToken&&Date.now()<gTokenExp-60000) return res(gToken);
    if(!tokenClient) initTokenClient();
    tokenResolve=res;tokenReject=rej;
    try{tokenClient.requestAccessToken({prompt:interactive?"consent":""});}
    catch(e){tokenResolve=tokenReject=null;rej(e);}
  });
}

/* ---- Drive REST (appDataFolder) ---- */
async function driveFind(token){
  const q=encodeURIComponent("name='"+SYNC_FILE+"'");
  const r=await fetch("https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q="+q+"&fields=files(id,modifiedTime)",{headers:{Authorization:"Bearer "+token}});
  if(!r.ok) throw new Error("Drive list failed ("+r.status+")");
  const j=await r.json(); return (j.files&&j.files[0])||null;
}
async function driveDownload(token,id){
  const r=await fetch("https://www.googleapis.com/drive/v3/files/"+id+"?alt=media",{headers:{Authorization:"Bearer "+token}});
  if(!r.ok) throw new Error("Drive download failed ("+r.status+")");
  return r.json();
}
async function driveUpload(token,id,obj){
  const body=JSON.stringify(obj);
  if(id){
    const r=await fetch("https://www.googleapis.com/upload/drive/v3/files/"+id+"?uploadType=media",{method:"PATCH",headers:{Authorization:"Bearer "+token,"Content-Type":"application/json"},body});
    if(!r.ok) throw new Error("Drive update failed ("+r.status+")"); return id;
  }
  const boundary="theatre"+Date.now();
  const meta={name:SYNC_FILE,parents:["appDataFolder"]};
  const multipart="--"+boundary+"\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n"+JSON.stringify(meta)+"\r\n--"+boundary+"\r\nContent-Type: application/json\r\n\r\n"+body+"\r\n--"+boundary+"--";
  const r=await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id",{method:"POST",headers:{Authorization:"Bearer "+token,"Content-Type":"multipart/related; boundary="+boundary},body:multipart});
  if(!r.ok) throw new Error("Drive create failed ("+r.status+")"); const j=await r.json(); return j.id;
}

/* ---- snapshot ---- */
async function buildSnapshot(){
  const snap={_app:"theatre",_schema:SCHEMA_VERSION,syncedAt:Date.now(),deviceId:syncCfg.deviceId};
  for(const s of DATA_STORES) snap[s]=await dbAll(s);
  return snap;
}
async function applySnapshot(snap){
  suspendDirty=true;
  try{ for(const s of DATA_STORES){ if(!Array.isArray(snap[s])) continue; await dbClear(s); for(const rec of snap[s]) await dbPut(s,rec); } }
  finally{ suspendDirty=false; }
}

/* ---- high-level ops ---- */
async function pushSync(){
  const token=await getToken(false);
  if(!syncCfg.fileId){const f=await driveFind(token);if(f)syncCfg.fileId=f.id;}
  const snap=await buildSnapshot();
  syncCfg.fileId=await driveUpload(token,syncCfg.fileId,snap);
  syncCfg.lastSyncAt=snap.syncedAt; syncCfg.dirtySince=0; await saveSyncCfg();
  return snap.syncedAt;
}
// Reconcile remote and local. Returns a status string, or {conflict, remote}.
async function syncNow(interactive){
  await getToken(interactive);
  const token=await getToken(false);
  const f=await driveFind(token);
  if(!f){ await pushSync(); return "Cloud backup created."; }
  syncCfg.fileId=f.id;
  const remote=await driveDownload(token,f.id);
  const localDirty=syncCfg.dirtySince>syncCfg.lastSyncAt;
  const remoteNewer=(remote.syncedAt||0)>syncCfg.lastSyncAt;
  if(remoteNewer&&localDirty) return {conflict:true,remote};
  if(remoteNewer){ await applySnapshot(remote); syncCfg.lastSyncAt=remote.syncedAt; syncCfg.dirtySince=0; await saveSyncCfg(); return "Pulled the latest from Drive."; }
  if(localDirty){ await pushSync(); return "Pushed your changes to Drive."; }
  syncCfg.lastSyncAt=Math.max(syncCfg.lastSyncAt,remote.syncedAt||0); await saveSyncCfg(); return "Already up to date.";
}
async function resolveConflict(keep,remote){
  if(keep==="cloud"){ await applySnapshot(remote); syncCfg.lastSyncAt=remote.syncedAt; syncCfg.dirtySince=0; await saveSyncCfg(); }
  else { await pushSync(); }                       // keep this device → overwrite cloud
}

function syncBadgeText(){
  if(!syncCfg||!syncCfg.connected) return "local only";
  if(syncCfg.dirtySince>syncCfg.lastSyncAt) return "unsynced changes";
  if(syncCfg.lastSyncAt) return "synced "+new Date(syncCfg.lastSyncAt).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
  return "connected";
}
function updateSyncBadge(){const el=document.getElementById("syncState");if(el)el.textContent=syncBadgeText();}

/* =========================================================================
   STUDY LIBRARY  (slice 6)
   Reads library.json (the textbook→page chat's output), groups by track/topic,
   tracks per-page confidence (which can raise the matching coverage tile).
   ========================================================================= */
let libQuery="", libTrack="all", libFocusSearch=false;
const LIB_TRACK_ORDER=["frcophth","msra","other"];
const LIB_TRACK_LABEL={frcophth:"FRCOphth Part 1",msra:"MSRA",other:"Other"};
const normTrack=t=>LIB_TRACK_ORDER.includes(t)?t:"other";

async function renderLibrary(el){
  const state=await dbAll("library"); const stateMap={}; state.forEach(s=>stateMap[s.id]=s);

  let pages=null, err=null;
  try{
    const r=await fetch("library.json");
    if(r.status===404) pages=[];
    else if(!r.ok) err="library.json returned "+r.status+".";
    else { const j=await r.json(); pages=Array.isArray(j.pages)?j.pages:[]; }
  }catch(e){ err="Couldn't load the library — you may be offline, or library.json is missing or invalid."; }

  const controls=`
    <div class="lib-controls">
      <input id="libSearch" class="lib-search" placeholder="Search the library…" autocomplete="off">
      <div class="lib-tracks">
        ${[["all","All"],["frcophth","FRCOphth"],["msra","MSRA"],["other","Other"]].map(([v,l])=>`<button class="ltab ${libTrack===v?"on":""}" data-libtrack="${v}">${l}</button>`).join("")}
      </div>
    </div>`;

  let body;
  if(err){ body=`<div class="empty"><h3>Library unavailable</h3><p>${esc(err)}</p></div>`; }
  else if(pages.length===0){
    body=`<div class="empty"><h3>No library yet</h3>
      <p>Interactive pages live as standalone files in your repo and are listed in <span class="mono">library.json</span> at the site root. Add that file — your textbook→page chat produces it — and your pages appear here, grouped by exam and topic.</p></div>`;
  } else {
    const q=libQuery.trim().toLowerCase();
    const filtered=pages.filter(p=>{
      if(libTrack!=="all" && normTrack(p.track)!==libTrack) return false;
      if(q){ const hay=(p.title+" "+(p.topic||"")+" "+(p.source||"")+" "+(p.summary||"")).toLowerCase(); if(!hay.includes(q)) return false; }
      return true;
    });
    if(filtered.length===0){ body=`<div class="empty"><h3>No matches</h3><p>Nothing in the library matches that filter.</p></div>`; }
    else{
      body="";
      for(const tr of LIB_TRACK_ORDER){
        const inTr=filtered.filter(p=>normTrack(p.track)===tr);
        if(!inTr.length) continue;
        body+=`<div class="lib-track"><div class="cov-th"><span class="cov-name">${LIB_TRACK_LABEL[tr]}</span><span class="cov-summary mono">${inTr.length} page${inTr.length>1?"s":""}</span></div>`;
        const topics=[...new Set(inTr.map(p=>p.topic||"general"))].sort();
        for(const tp of topics){
          body+=`<div class="lib-topic"><div class="lib-topic-h">${esc(tp)}</div>`;
          body+=inTr.filter(p=>(p.topic||"general")===tp).map(p=>libCard(p,stateMap[p.id])).join("");
          body+=`</div>`;
        }
        body+=`</div>`;
      }
    }
  }

  el.innerHTML=controls+body;

  const s=el.querySelector("#libSearch");
  if(s){ s.value=libQuery; s.oninput=()=>{libQuery=s.value;libFocusSearch=true;renderLibrary(el);}; }
  el.querySelectorAll("[data-libtrack]").forEach(b=>b.onclick=()=>{libTrack=b.dataset.libtrack;renderLibrary(el);});
  el.querySelectorAll("[data-librate]").forEach(b=>b.onclick=()=>cycleLibConfidence(b.dataset.librate,b.dataset.track,b.dataset.topic,el));
  el.querySelectorAll("[data-open]").forEach(a=>a.addEventListener("click",async ev=>{ev.preventDefault();await recordOpen(a.dataset.open);location.href=a.getAttribute("href");}));
  if(libFocusSearch){const s2=el.querySelector("#libSearch");if(s2){s2.focus();s2.setSelectionRange(s2.value.length,s2.value.length);}libFocusSearch=false;}
}

function libCard(p,state){
  const r=state?(state.rating||0):0;
  const opened=state&&state.lastOpened?("opened "+esc(shortDM(state.lastOpened.slice(0,10)))):"";
  return `<article class="lib-card">
    <div class="lib-main">
      <a class="lib-open" href="${esc(p.file)}" data-open="${esc(p.id)}">
        <span class="lib-title">${esc(p.title)}</span>
        ${p.summary?`<span class="lib-sum">${esc(p.summary)}</span>`:""}
      </a>
      <div class="lib-meta">${p.source?`<span class="lib-src mono">${esc(p.source)}</span>`:""}${opened?`<span class="lib-opened mono">${opened}</span>`:""}</div>
    </div>
    <button class="cov-tile cov-${r} lib-rate" data-librate="${esc(p.id)}" data-track="${esc(normTrack(p.track))}" data-topic="${esc(p.topic||"")}">
      <span class="ct-name">confidence</span><span class="ct-state">${COV_STATES[r]}</span>
    </button>
  </article>`;
}

async function recordOpen(id){
  const cur=await dbGet("library",id);
  await dbPut("library",{id,rating:cur?(cur.rating||0):0,lastOpened:new Date().toISOString()});
}
async function cycleLibConfidence(id,track,topic,el){
  const cur=await dbGet("library",id);
  const r=((cur?cur.rating:0)+1)%4;
  await dbPut("library",{id,rating:r,lastOpened:cur?cur.lastOpened:null});
  // Feed the coverage map: a page rating can only RAISE its topic, never lower it.
  if(track&&topic){
    const key=track+":"+topic, cov=await dbGet("coverage",key), cr=cov?(cov.rating||0):0;
    if(r>cr) await dbPut("coverage",{key,track,topic,rating:r});
  }
  renderLibrary(el);
}

   STUBS (built in later slices)

async function stub(el){
  const v=currentView();
  const map={library:["▤","Study library","Your interactive chapters, indexed by track and topic — slice 6."]};
  const [ic,h,p]=map[v]||["·","Soon",""];

}

/* =========================================================================
   Seed + boot
   ========================================================================= */
async function seed(){
  const ex=await getSetting("exams",null);
  if(!ex){
    // editable placeholders until a plan or you set the real dates
    await setSetting("exams",{frcophth_part1:"2026-10-15",msra:"2027-01-10"});
  }
  await dbPut("meta",{key:"schemaVersion",value:SCHEMA_VERSION});
}
(async function boot(){
  try{ await openDB(); await loadSyncCfg(); await seed(); await route(); updateSyncBadge(); }
  catch(e){ document.getElementById("view").innerHTML=`<div class="empty"><h3>Storage unavailable</h3><p>This browser blocked local storage. Open the deployed site (not a private window) to use Theatre.</p></div>`; console.error(e); return; }

  // Register the service worker (offline + installable). Harmless if unsupported.
  if("serviceWorker" in navigator){
    window.addEventListener("load",()=>navigator.serviceWorker.register("service-worker.js").catch(e=>console.warn("SW registration failed",e)));
  }

  // Best-effort sync on open: wait briefly for the Google library, then reconcile silently.
  if(syncCfg.connected&&syncCfg.auto){
    setTimeout(async()=>{
      if(!gisReady()) return;                 // offline or library blocked — skip quietly
      try{
        const r=await syncNow(false);
        if(r&&r.conflict){ pendingConflict=r.remote; toast("Sync conflict — resolve it in Settings"); }
        else { updateSyncBadge(); if(currentView()!=="settings") route(); }
      }catch(e){ console.warn("open sync",e); }
    },1800);
  }
})();
</script>
